name: keep-alive

# Pings the Render backend so the free instance never spins down (which would
# add a ~50s cold start to the first unannounced call/chat). Public-repo Actions
# minutes are free. GitHub may delay scheduled runs a few minutes under load —
# a 10-min cadence comfortably stays inside Render's ~15-min idle window.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
              https://eeshu-persona-api.onrender.com/api/health)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "backend did not return 200"; exit 1
